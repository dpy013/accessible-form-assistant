name: Build binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller build scons

      - name: Run compile check
        shell: pwsh
        run: |
          python -m compileall src

      - name: Set build metadata
        shell: pwsh
        run: |
          $buildLabel = [DateTime]::UtcNow.ToString("yyMMdd") + "s"
          $env:BUILD_LABEL = $buildLabel
          $releaseName = python -c "from src.app_meta import release_name; print(release_name())"
          "BUILD_LABEL=$buildLabel" >> $env:GITHUB_ENV
          "APP_RELEASE_NAME=$releaseName" >> $env:GITHUB_ENV

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --clean accessible-form-assist.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_RELEASE_NAME }}-windows-x64
          path: dist/${{ env.APP_RELEASE_NAME }}/**
          if-no-files-found: error

      - name: Delete previous workflow runs
        if: ${{ success() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: build-binary.yml
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "accessible-form-assistant-cleanup"
          }
          $repo = "${{ github.repository }}"
          $currentRunId = [int64]"${{ github.run_id }}"
          $runsUri = "https://api.github.com/repos/$repo/actions/workflows/$env:WORKFLOW_FILE/runs?per_page=100"
          $runs = (Invoke-RestMethod -Method Get -Uri $runsUri -Headers $headers).workflow_runs |
            Where-Object { $_.id -ne $currentRunId -and $_.status -eq "completed" }

          foreach ($run in $runs) {
            $deleteUri = "https://api.github.com/repos/$repo/actions/runs/$($run.id)"
            Write-Host "Deleting old workflow run $($run.id): $($run.display_title)"
            Invoke-RestMethod -Method Delete -Uri $deleteUri -Headers $headers
          }

